<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود — نانا</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-logo">🌿 نانا</div>
        <h2>ورود به حساب</h2>
        <div id="errorMsg" class="alert-error" style="display:none"></div>
        <div class="auth-form">
          <div class="form-group">
            <label>نام کاربری</label>
            <input type="text" id="username" placeholder="نام کاربری را وارد کنید">
          </div>
          <div class="form-group">
            <label>رمز عبور</label>
            <input type="password" id="password" placeholder="رمز عبور را وارد کنید" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <button onclick="doLogin()" class="btn-submit" id="loginBtn">ورود</button>
        </div>
        <p class="auth-switch">حساب ندارید؟ <a href="/register.html">ثبت‌نام کنید</a></p>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script src="/js/shared.js"></script>
  <script>
    (async () => {
      const user = await getUser();
      if (user) { window.location.href = '/dashboard.html'; return; }
      injectLayout(null);
    })();

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');
      if (!username || !password) { err.textContent = 'لطفاً همه فیلدها را پر کنید'; err.style.display = 'block'; return; }
      btn.textContent = 'در حال ورود...'; btn.disabled = true;
      const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
      const data = await res.json();
      if (data.success) { window.location.href = '/dashboard.html'; }
      else { err.textContent = data.error; err.style.display = 'block'; btn.textContent = 'ورود'; btn.disabled = false; }
    }
  </script>
</body>
</html>
