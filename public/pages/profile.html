<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پروفایل — نانا</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .profile-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--green); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 800; flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-info h1 { font-size: 22px; margin-bottom: 4px; }
    .profile-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Password form */
    .pw-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 28px;
    }
    .pw-card-head {
      padding: 16px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    }
    .pw-card-head h3 { font-size: 16px; font-weight: 700; }
    .pw-card-body { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
    .pw-card-body.collapsed { display: none; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; color: var(--text2); }
    .pw-input {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 11px 14px; border-radius: 9px;
      font-family: 'Vazirmatn', sans-serif; font-size: 14px; outline: none;
    }
    .pw-input:focus { border-color: var(--green); }
    .pw-btn {
      background: var(--green); color: white; border: none;
      border-radius: 9px; padding: 11px 24px;
      font-family: 'Vazirmatn', sans-serif; font-size: 14px;
      font-weight: 600; cursor: pointer; width: fit-content;
      transition: background .2s;
    }
    .pw-btn:hover { background: var(--green-light); }
    .pw-notice {
      background: rgba(45,158,107,.08); border: 1px solid rgba(45,158,107,.2);
      border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: var(--text2); line-height: 1.6;
    }
    .pw-notice strong { color: var(--green-light); }

    .alert-success {
      background: rgba(45,158,107,.15); border: 1px solid rgba(45,158,107,.3);
      color: var(--green-light); padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
    }
    .alert-error {
      background: rgba(220,50,50,.12); border: 1px solid rgba(220,50,50,.25);
      color: #ff6b6b; padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
    }

    /* Saved tabs */
    .saved-section h2 { font-size: 20px; margin-bottom: 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text2); padding: 9px 20px; border-radius: 8px;
      font-family: 'Vazirmatn', sans-serif; cursor: pointer; transition: all .2s;
    }
    .tab-btn.active { background: var(--green); border-color: var(--green); color: white; }
    .tab-content.hidden { display: none; }

    .btn-logout {
      background: rgba(220,50,50,.12); color: #ff6b6b;
      border: 1px solid rgba(220,50,50,.25); padding: 9px 18px;
      border-radius: 9px; text-decoration: none; font-weight: 600; font-size: 13px;
      cursor: pointer; font-family: 'Vazirmatn', sans-serif;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <main class="content-page">
    <div class="container">

      <!-- Profile Header Card -->
      <div class="profile-card">
        <div class="profile-avatar" id="avatar">?</div>
        <div class="profile-info">
          <h1 id="pUsername">در حال بارگذاری...</h1>
          <span class="role-badge" id="roleBadge" style="font-size:13px;padding:4px 14px;border-radius:12px;font-weight:600"></span>
        </div>
        <div class="profile-actions">
          <button onclick="logout()" class="btn-logout">🚪 خروج از حساب</button>
        </div>
      </div>

      <!-- Change Password Card -->
      <div class="pw-card">
        <div class="pw-card-head" onclick="togglePwForm()">
          <h3>🔐 تغییر رمز عبور</h3>
          <span id="pwToggleIcon" style="color:var(--text2);font-size:18px">＋</span>
        </div>
        <div class="pw-card-body collapsed" id="pwForm">
          <div class="pw-notice">
            ⚠️ رمز حساب <strong id="pwUsername">شما</strong> تغییر می‌کند.
            بعد از تغییر، با رمز جدید وارد شوید.
          </div>
          <div id="pwAlert"></div>
          <div class="form-group">
            <label>رمز فعلی *</label>
            <input type="password" class="pw-input" id="oldPw" placeholder="رمز فعلی را وارد کنید">
          </div>
          <div class="form-group">
            <label>رمز جدید *</label>
            <input type="password" class="pw-input" id="newPw" placeholder="حداقل ۴ کاراکتر">
          </div>
          <div class="form-group">
            <label>تکرار رمز جدید *</label>
            <input type="password" class="pw-input" id="newPw2" placeholder="رمز جدید را تکرار کنید"
              onkeydown="if(event.key==='Enter')changePw()">
          </div>
          <button class="pw-btn" onclick="changePw()">💾 ذخیره رمز جدید</button>
        </div>
      </div>

      <!-- Saved Items -->
      <div class="saved-section">
        <h2>🗂️ موارد ذخیره شده من</h2>
        <div class="tabs">
          <button class="tab-btn active" onclick="showTab('exTab',this)">
            🏋️ ورزش (<span id="exCount">0</span>)
          </button>
          <button class="tab-btn" onclick="showTab('nutTab',this)">
            🥗 تغذیه (<span id="nutCount">0</span>)
          </button>
        </div>

        <div id="exTab" class="tab-content">
          <div class="items-grid" id="exGrid">
            <div class="empty-state"><span>⏳</span><p>در حال بارگذاری...</p></div>
          </div>
        </div>

        <div id="nutTab" class="tab-content hidden">
          <div class="items-grid" id="nutGrid">
            <div class="empty-state"><span>⏳</span><p>در حال بارگذاری...</p></div>
          </div>
        </div>
      </div>

    </div>
  </main>
  <div id="footer"></div>
  <script src="/js/shared.js"></script>
  <script>
    let pwFormOpen = false;

    function togglePwForm() {
      pwFormOpen = !pwFormOpen;
      const form = document.getElementById('pwForm');
      const icon = document.getElementById('pwToggleIcon');
      form.classList.toggle('collapsed', !pwFormOpen);
      icon.textContent = pwFormOpen ? '－' : '＋';
    }

    async function changePw() {
      const oldPw  = document.getElementById('oldPw').value;
      const newPw  = document.getElementById('newPw').value;
      const newPw2 = document.getElementById('newPw2').value;
      const alertEl = document.getElementById('pwAlert');
      alertEl.innerHTML = '';

      if (!oldPw || !newPw || !newPw2) {
        alertEl.innerHTML = '<div class="alert-error">همه فیلدها را پر کنید</div>'; return;
      }
      if (newPw !== newPw2) {
        alertEl.innerHTML = '<div class="alert-error">رمز جدید با تکرارش یکسان نیست</div>'; return;
      }
      if (newPw.length < 4) {
        alertEl.innerHTML = '<div class="alert-error">رمز جدید باید حداقل ۴ کاراکتر باشد</div>'; return;
      }

      const res = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw })
      }).then(r => r.json());

      if (res.success) {
        alertEl.innerHTML = '<div class="alert-success">✅ رمز با موفقیت تغییر یافت! دفعه بعد با رمز جدید وارد شوید.</div>';
        document.getElementById('oldPw').value = '';
        document.getElementById('newPw').value = '';
        document.getElementById('newPw2').value = '';
      } else {
        alertEl.innerHTML = `<div class="alert-error">${res.error || 'خطا در تغییر رمز'}</div>`;
      }
    }

    // Page init
    (async () => {
      const user = await requireLogin();
      if (!user) return;
      injectLayout(user);

      document.getElementById('avatar').textContent = user.username.charAt(0).toUpperCase();
      document.getElementById('pUsername').textContent = user.username;
      document.getElementById('pwUsername').textContent = user.username;

      const badge = document.getElementById('roleBadge');
      badge.textContent  = user.role === 'admin' ? '👑 مدیر' : '👤 کاربر';
      badge.className = 'role-badge ' + user.role;
      badge.style.background = user.role === 'admin'
        ? 'rgba(244,167,38,.18)' : 'rgba(45,158,107,.15)';
      badge.style.color = user.role === 'admin' ? 'var(--accent)' : 'var(--green-light)';
      badge.style.border = user.role === 'admin'
        ? '1px solid rgba(244,167,38,.3)' : '1px solid rgba(45,158,107,.3)';

      const data = await fetch('/api/profile').then(r => r.json());
      document.getElementById('exCount').textContent  = data.savedExercises.length;
      document.getElementById('nutCount').textContent = data.savedNutrition.length;

      const catEx  = { upper:'بالا تنه', lower:'پایین تنه', cardio:'کاردیو', flexibility:'انعطاف', full:'تمام بدن' };
      const catNut = { diet:'رژیم لاغری', muscle:'عضله‌سازی', healthy:'سالم‌خوری', recipe:'دستور پخت' };

      document.getElementById('exGrid').innerHTML = data.savedExercises.length === 0
        ? '<div class="empty-state"><span>🏋️</span><p>آموزش ورزشی ذخیره نشده</p></div>'
        : data.savedExercises.map(ex => `
          <div class="item-card">
            ${ex.image ? `<div class="item-media"><img src="${ex.image}" loading="lazy"></div>` : '<div class="item-media no-media">🏋️</div>'}
            <div class="item-body">
              <div class="item-category">${catEx[ex.category]||ex.category}</div>
              <h3>${ex.title}</h3>
              <p>${ex.description||''}</p>
            </div>
          </div>`).join('');

      document.getElementById('nutGrid').innerHTML = data.savedNutrition.length === 0
        ? '<div class="empty-state"><span>🥗</span><p>برنامه غذایی ذخیره نشده</p></div>'
        : data.savedNutrition.map(n => `
          <div class="item-card">
            ${n.image ? `<div class="item-media"><img src="${n.image}" loading="lazy"></div>` : '<div class="item-media no-media">🥗</div>'}
            <div class="item-body">
              <div class="item-category">${catNut[n.category]||n.category}</div>
              <h3>${n.title}</h3>
              <p>${n.description||''}</p>
            </div>
          </div>`).join('');
    })();

    function showTab(id, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.remove('hidden');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
