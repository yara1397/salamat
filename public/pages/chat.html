<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>چت — نانا</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="navbar"></div>

  <div class="chat-page">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="chat-layout">
      <!-- Sidebar -->
      <aside class="chat-sidebar" id="chatSidebar">
        <div class="sidebar-head">
          <h3>💬 پیام‌ها</h3>
          <div class="tab-row">
            <button class="stab active" id="tabPublic" onclick="switchMode('public')">🌐 عمومی</button>
            <button class="stab" id="tabPrivate" onclick="switchMode('private')">🔒 خصوصی</button>
          </div>
        </div>
        <div class="online-list">
          <div class="online-head">
            <span>👥 آنلاین</span>
            <span class="online-count" id="onlineCount">0</span>
          </div>
          <div id="onlineList"><div style="padding:16px;text-align:center;color:var(--text2);font-size:12px">در حال بارگذاری...</div></div>
          <div class="online-head" style="margin-top:10px"><span>💬 خصوصی</span></div>
          <div id="privateConvs"></div>
        </div>
      </aside>

      <!-- Main -->
      <div class="chat-main">
        <div class="chat-topbar">
          <button class="mobile-sidebar-toggle" onclick="openSidebar()">👥 کاربران</button>
          <div class="chat-topbar-avatar" id="topbarAvatar">🌐</div>
          <div class="chat-topbar-info">
            <h4 id="topbarName">چت عمومی</h4>
            <span id="topbarSub">همه کاربران آنلاین می‌بینند</span>
          </div>
          <span class="chat-topbar-badge badge-public" id="topbarBadge">عمومی</span>
        </div>

        <div class="messages-area" id="messagesArea">
          <button class="scroll-to-bottom" id="scrollBtn" onclick="scrollBottom()">↓ جدید</button>
          <div class="empty-chat" id="emptyChat">
            <span>💬</span>
            <p>در حال اتصال...</p>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="input-row">
            <textarea class="msg-input" id="msgInput" rows="1"
              placeholder="پیام بنویسید... (Enter = ارسال)"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/shared.js"></script>
  <script>
    let me = null, socket = null;
    let mode = 'public', privateTarget = null;
    let unreadCounts = {}, scrolledUp = false;

    const messagesArea = document.getElementById('messagesArea');
    const scrollBtn = document.getElementById('scrollBtn');

    messagesArea.addEventListener('scroll', () => {
      const atBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 80;
      scrolledUp = !atBottom;
      scrollBtn.style.display = (!atBottom) ? 'inline-block' : 'none';
    });

    function scrollBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
      scrollBtn.style.display = 'none';
      scrolledUp = false;
    }
    function autoScroll() {
      if (!scrolledUp) { messagesArea.scrollTop = messagesArea.scrollHeight; }
      else scrollBtn.style.display = 'inline-block';
    }

    function openSidebar() {
      document.getElementById('chatSidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('show');
    }
    function closeSidebar() {
      document.getElementById('chatSidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    }

    (async () => {
      me = await requireLogin();
      if (!me) return;
      injectLayout(me);
      initSocket();
    })();

    function initSocket() {
      socket = io({ transports: ['websocket', 'polling'] });
      socket.on('connect', () => { socket.emit('chat:join'); socket.emit('chat:getPublic'); });
      socket.on('chat:users', users => renderOnlineList(users.filter(u => u.userId !== me.id)));
      socket.on('chat:public', msg => { if (mode === 'public') { appendMsg(msg, false); autoScroll(); } });
      socket.on('chat:private', msg => {
        const otherId = msg.userId === me.id ? msg.toUserId : msg.userId;
        const otherName = msg.userId === me.id ? (msg.toUsername || '') : msg.username;
        if (mode === 'private' && privateTarget?.userId === otherId) { appendMsg(msg, true); autoScroll(); }
        else { unreadCounts[otherId] = (unreadCounts[otherId] || 0) + 1; updatePrivateConvEntry(otherId, otherName, msg.message); renderOnlineList(currentOnlineList); }
      });
      socket.on('chat:history:public', msgs => { clearMessages(); msgs.forEach(m => appendMsg(m, false)); scrollBottom(); });
      socket.on('chat:history:private', ({ withUserId, msgs }) => {
        if (privateTarget?.userId !== withUserId) return;
        clearMessages(); msgs.forEach(m => appendMsg(m, true)); scrollBottom();
      });
      socket.on('chat:userJoined', ({ username }) => appendSys('🟢 ' + username + ' آنلاین شد'));
      socket.on('chat:userLeft', ({ username }) => appendSys('⚫ ' + username + ' آفلاین شد'));
    }

    let currentOnlineList = [];
    function switchMode(m) {
      mode = m;
      document.getElementById('tabPublic').classList.toggle('active', m === 'public');
      document.getElementById('tabPrivate').classList.toggle('active', m === 'private');
      if (m === 'public') {
        privateTarget = null;
        updateTopbar('🌐', 'چت عمومی', 'همه کاربران آنلاین می‌بینند', true);
        clearMessages();
        socket.emit('chat:getPublic');
        document.querySelectorAll('.online-item').forEach(el => el.classList.remove('selected'));
      }
    }

    function selectPrivate(userId, username) {
      mode = 'private'; privateTarget = { userId, username };
      document.getElementById('tabPublic').classList.remove('active');
      document.getElementById('tabPrivate').classList.add('active');
      updateTopbar(username.charAt(0).toUpperCase(), username, 'پیام خصوصی', false);
      clearMessages();
      unreadCounts[userId] = 0;
      updatePrivateConvEntry(userId, username);
      socket.emit('chat:getPrivate', { withUserId: userId });
      document.querySelectorAll('.online-item').forEach(el => el.classList.remove('selected'));
      const el = document.querySelector(`[data-uid="${userId}"]`);
      if (el) el.classList.add('selected');
      closeSidebar();
    }

    function updateTopbar(av, name, sub, isPublic) {
      document.getElementById('topbarAvatar').textContent = av;
      document.getElementById('topbarName').textContent = name;
      document.getElementById('topbarSub').textContent = sub;
      const badge = document.getElementById('topbarBadge');
      badge.textContent = isPublic ? 'عمومی' : 'خصوصی';
      badge.className = 'chat-topbar-badge ' + (isPublic ? 'badge-public' : 'badge-private');
    }

    function renderOnlineList(users) {
      currentOnlineList = users;
      document.getElementById('onlineCount').textContent = users.length;
      const list = document.getElementById('onlineList');
      if (users.length === 0) {
        list.innerHTML = '<div style="padding:14px;text-align:center;color:var(--text2);font-size:12px">هیچ کاربری آنلاین نیست</div>';
        return;
      }
      list.innerHTML = users.map(u => `
        <div class="online-item${privateTarget?.userId===u.userId?' selected':''}" data-uid="${u.userId}" onclick="selectPrivate('${u.userId}','${esc(u.username)}')">
          <span class="online-dot"></span>
          <div class="online-avatar">${u.username.charAt(0).toUpperCase()}</div>
          <div class="online-name">${esc(u.username)}${u.role==='admin' ? ' 👑' : ''}</div>
          ${unreadCounts[u.userId] ? `<span class="unread-badge">${unreadCounts[u.userId]}</span>` : ''}
        </div>`).join('');
    }

    function updatePrivateConvEntry(userId, username, lastMsg) {
      const convs = document.getElementById('privateConvs');
      let el = convs.querySelector(`[data-conv="${userId}"]`);
      if (!el) {
        el = document.createElement('div');
        el.className = 'online-item'; el.dataset.conv = userId;
        el.onclick = () => selectPrivate(userId, username);
        convs.appendChild(el);
      }
      const count = unreadCounts[userId] || 0;
      el.innerHTML = `
        <div class="online-avatar" style="background:var(--accent)">${username.charAt(0).toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div class="online-name">${esc(username)}</div>
          ${lastMsg ? `<div style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(lastMsg)}</div>` : ''}
        </div>
        ${count > 0 ? `<span class="unread-badge">${count}</span>` : ''}`;
    }

    function clearMessages() {
      messagesArea.innerHTML = '';
      messagesArea.appendChild(scrollBtn);
      const ec = document.getElementById('emptyChat');
      if (ec) ec.style.display = 'none';
    }

    function appendMsg(msg, isPrivate) {
      const isMe = msg.userId === me.id;
      const wrap = document.createElement('div');
      wrap.className = 'msg-bubble ' + (isMe ? 'mine' : 'theirs');
      const time = new Date(msg.time).toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
      let privateTag = '';
      if (isPrivate) {
        const other = isMe ? (msg.toUsername || '') : msg.username;
        privateTag = `<div class="private-label">🔒 ${isMe ? 'به ' + esc(other) : 'خصوصی'}</div>`;
      }
      wrap.innerHTML = `
        ${!isMe ? `<div class="msg-sender">${esc(msg.username)}${msg.role==='admin' ? ' 👑' : ''}</div>` : ''}
        ${privateTag}
        <div class="msg-body ${isPrivate ? 'private-msg' : ''}">${esc(msg.message)}</div>
        <div class="msg-time">${time}</div>`;
      messagesArea.insertBefore(wrap, scrollBtn);
    }

    function appendSys(text) {
      const div = document.createElement('div');
      div.className = 'msg-sys'; div.textContent = text;
      messagesArea.insertBefore(div, scrollBtn);
      autoScroll();
    }

    function esc(t) {
      if (!t) return '';
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function sendMessage() {
      const inp = document.getElementById('msgInput');
      const text = inp.value.trim();
      if (!text || !socket) return;
      if (mode === 'public') socket.emit('chat:sendPublic', { message: text });
      else if (mode === 'private' && privateTarget) socket.emit('chat:sendPrivate', { toUserId: privateTarget.userId, toUsername: privateTarget.username, message: text });
      inp.value = ''; inp.style.height = '';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function autoResize(el) {
      el.style.height = '';
      el.style.height = Math.min(el.scrollHeight, 90) + 'px';
    }
  </script>
</body>
</html>
