<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>چت — نانا</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { height: 100vh; overflow: hidden; }
    .chat-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 65px);
    }

    /* ── Sidebar ── */
    .chat-sidebar {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-head h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .tab-row { display: flex; gap: 6px; }
    .stab {
      flex: 1; padding: 7px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); font-family: 'Vazirmatn', sans-serif;
      font-size: 13px; cursor: pointer; transition: all .15s;
    }
    .stab.active { background: var(--green); border-color: var(--green); color: white; }

    .online-list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .online-head { font-size: 11px; color: var(--text2); padding: 6px 8px 4px; font-weight: 700; letter-spacing: .5px; }
    .online-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 9px;
      cursor: pointer; transition: background .15s; position: relative;
    }
    .online-item:hover { background: var(--bg3); }
    .online-item.selected { background: rgba(45,158,107,.15); }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4dff9a; flex-shrink: 0; }
    .offline-dot { background: #555; }
    .online-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--green); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .online-name { font-size: 13px; font-weight: 600; flex: 1; }
    .online-role { font-size: 10px; color: var(--accent); }
    .unread-badge {
      background: var(--green); color: white;
      border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700;
    }

    /* ── Main chat ── */
    .chat-main {
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    .chat-topbar {
      padding: 12px 18px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .chat-topbar-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--green); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px;
    }
    .chat-topbar-info h4 { font-size: 15px; font-weight: 700; }
    .chat-topbar-info span { font-size: 12px; color: var(--text2); }
    .chat-topbar-badge {
      margin-right: auto;
      padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;
    }
    .badge-public { background: rgba(45,158,107,.15); color: var(--green-light); border: 1px solid rgba(45,158,107,.25); }
    .badge-private { background: rgba(244,167,38,.12); color: var(--accent); border: 1px solid rgba(244,167,38,.25); }

    .messages-area {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }

    /* Date divider */
    .date-divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--text2); font-size: 11px; margin: 8px 0;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Messages */
    .msg-bubble {
      max-width: 72%; display: flex; flex-direction: column; gap: 3px;
    }
    .msg-bubble.mine { align-self: flex-end; align-items: flex-end; }
    .msg-bubble.theirs { align-self: flex-start; align-items: flex-start; }
    .msg-sender { font-size: 11px; color: var(--text2); padding: 0 4px; font-weight: 600; }
    .msg-body {
      padding: 10px 14px; border-radius: 14px;
      font-size: 14px; line-height: 1.5; word-break: break-word;
    }
    .mine .msg-body {
      background: var(--green); color: white;
      border-bottom-left-radius: 4px;
    }
    .theirs .msg-body {
      background: var(--card); border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
    }
    .msg-body.private-msg {
      background: rgba(244,167,38,.15) !important;
      border: 1px solid rgba(244,167,38,.3) !important;
      color: var(--text) !important;
    }
    .msg-time { font-size: 10px; color: var(--text2); padding: 0 4px; }
    .msg-sys {
      text-align: center; font-size: 11px; color: var(--text2);
      font-style: italic; padding: 2px 0;
    }
    .private-label {
      font-size: 11px; color: var(--accent);
      padding: 1px 8px; background: rgba(244,167,38,.1);
      border-radius: 8px; margin-bottom: 2px;
    }

    /* Scroll btn */
    .scroll-to-bottom {
      position: sticky; bottom: 8px; align-self: center;
      background: var(--green); color: white; border: none;
      border-radius: 20px; padding: 5px 16px;
      font-family: 'Vazirmatn', sans-serif; font-size: 12px;
      cursor: pointer; display: none; z-index: 5;
    }

    /* Input */
    .chat-input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      flex-shrink: 0; background: var(--bg2);
    }
    .reply-preview {
      background: var(--bg3); border-right: 3px solid var(--green);
      border-radius: 0 8px 8px 0; padding: 7px 12px; margin-bottom: 8px;
      font-size: 12px; color: var(--text2); display: none;
      display: flex; align-items: center; justify-content: space-between;
    }
    .reply-preview.show { display: flex; }
    .reply-close { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 16px; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 12px; padding: 10px 14px;
      font-family: 'Vazirmatn', sans-serif; font-size: 14px;
      outline: none; resize: none; max-height: 120px; min-height: 42px;
      line-height: 1.5;
    }
    .msg-input:focus { border-color: var(--green); }
    .send-btn {
      background: var(--green); color: white; border: none;
      border-radius: 10px; width: 42px; height: 42px; flex-shrink: 0;
      cursor: pointer; font-size: 18px; transition: background .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover { background: var(--green-light); }

    /* Empty state */
    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text2); gap: 12px;
    }
    .empty-chat span { font-size: 48px; }
    .empty-chat p { font-size: 14px; }

    @media(max-width: 768px) {
      .chat-layout { grid-template-columns: 1fr; }
      .chat-sidebar { display: none; }
      .chat-sidebar.show { display: flex; position: fixed; inset: 65px 0 0 0; z-index: 50; }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="chat-layout">
    <!-- Sidebar -->
    <aside class="chat-sidebar" id="chatSidebar">
      <div class="sidebar-head">
        <h3>💬 پیام‌ها</h3>
        <div class="tab-row">
          <button class="stab active" id="tabPublic" onclick="switchMode('public')">🌐 عمومی</button>
          <button class="stab" id="tabPrivate" onclick="switchMode('private')">🔒 خصوصی</button>
        </div>
      </div>
      <div class="online-list">
        <div class="online-head">👥 آنلاین</div>
        <div id="onlineList"></div>
        <div class="online-head" style="margin-top:12px">💬 مکالمات خصوصی</div>
        <div id="privateConvs"></div>
      </div>
    </aside>

    <!-- Chat Main -->
    <div class="chat-main">
      <div class="chat-topbar" id="chatTopbar">
        <div class="chat-topbar-avatar" id="topbarAvatar">🌐</div>
        <div class="chat-topbar-info">
          <h4 id="topbarName">چت عمومی</h4>
          <span id="topbarSub">همه کاربران می‌بینند</span>
        </div>
        <span class="chat-topbar-badge badge-public" id="topbarBadge">عمومی</span>
      </div>

      <div class="messages-area" id="messagesArea">
        <button class="scroll-to-bottom" id="scrollBtn" onclick="scrollBottom()">↓ پیام جدید</button>
        <div class="empty-chat" id="emptyChat">
          <span>💬</span>
          <p>در حال بارگذاری چت...</p>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="reply-preview" id="replyPreview">
          <span id="replyText">در حال پاسخ به...</span>
          <button class="reply-close" onclick="cancelReply()">✕</button>
        </div>
        <div class="input-row">
          <textarea class="msg-input" id="msgInput" rows="1" placeholder="پیام بنویسید..."
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/shared.js"></script>
  <script>
    let me = null;
    let socket = null;
    let mode = 'public'; // 'public' | 'private'
    let privateTarget = null; // { userId, username }
    let unreadCounts = {};
    let scrolledUp = false;
    let onlineUsers = [];

    const messagesArea = document.getElementById('messagesArea');
    const scrollBtn = document.getElementById('scrollBtn');
    const emptyChat = document.getElementById('emptyChat');

    messagesArea.addEventListener('scroll', () => {
      const atBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 60;
      scrolledUp = !atBottom;
      if (!scrolledUp) { scrollBtn.style.display = 'none'; }
    });

    function scrollBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
      scrollBtn.style.display = 'none';
      scrolledUp = false;
    }
    function autoScroll() {
      if (!scrolledUp) messagesArea.scrollTop = messagesArea.scrollHeight;
      else scrollBtn.style.display = 'inline-block';
    }

    (async () => {
      me = await requireLogin();
      if (!me) return;
      injectLayout(me);
      initSocket();
      loadPublicHistory();
    })();

    function initSocket() {
      socket = io();

      socket.on('chat:users', users => {
        onlineUsers = users;
        renderOnlineList(users);
      });

      socket.on('chat:public', msg => {
        if (mode === 'public') { appendMsg(msg, false); autoScroll(); }
      });

      socket.on('chat:private', msg => {
        const otherId = msg.userId === me.id ? msg.toUserId : msg.userId;
        const otherName = msg.userId === me.id ? msg.toUsername : msg.username;
        if (mode === 'private' && privateTarget?.userId === otherId) {
          appendMsg(msg, true); autoScroll();
        } else {
          // Increment unread badge
          unreadCounts[otherId] = (unreadCounts[otherId] || 0) + 1;
          updatePrivateConvEntry(otherId, otherName, msg.message);
        }
      });

      socket.on('chat:history:public', msgs => {
        clearMessages();
        msgs.forEach(m => appendMsg(m, false));
        scrollBottom();
      });

      socket.on('chat:history:private', ({ withUserId, msgs }) => {
        if (privateTarget?.userId !== withUserId) return;
        clearMessages();
        msgs.forEach(m => appendMsg(m, true));
        scrollBottom();
      });

      socket.on('chat:userJoined', ({ username }) => appendSys(username + ' آنلاین شد'));
      socket.on('chat:userLeft', ({ username }) => appendSys(username + ' آفلاین شد'));

      socket.emit('chat:join');
    }

    async function loadPublicHistory() {
      if (socket) socket.emit('chat:getPublic');
    }

    function switchMode(m) {
      mode = m;
      document.getElementById('tabPublic').classList.toggle('active', m === 'public');
      document.getElementById('tabPrivate').classList.toggle('active', m === 'private');
      if (m === 'public') {
        privateTarget = null;
        updateTopbar('🌐', 'چت عمومی', 'همه کاربران می‌بینند', true);
        clearMessages();
        socket.emit('chat:getPublic');
        document.querySelectorAll('.online-item').forEach(el => el.classList.remove('selected'));
      }
    }

    function selectPrivate(userId, username) {
      mode = 'private';
      privateTarget = { userId, username };
      document.getElementById('tabPublic').classList.remove('active');
      document.getElementById('tabPrivate').classList.add('active');
      updateTopbar(username.charAt(0).toUpperCase(), username, 'پیام خصوصی', false);
      clearMessages();
      unreadCounts[userId] = 0;
      updatePrivateConvEntry(userId, username);
      socket.emit('chat:getPrivate', { withUserId: userId });
      document.querySelectorAll('.online-item').forEach(el => el.classList.remove('selected'));
      const el = document.querySelector(`[data-uid="${userId}"]`);
      if (el) el.classList.add('selected');
    }

    function updateTopbar(av, name, sub, isPublic) {
      document.getElementById('topbarAvatar').textContent = av;
      document.getElementById('topbarName').textContent = name;
      document.getElementById('topbarSub').textContent = sub;
      const badge = document.getElementById('topbarBadge');
      badge.textContent = isPublic ? 'عمومی' : 'خصوصی';
      badge.className = 'chat-topbar-badge ' + (isPublic ? 'badge-public' : 'badge-private');
    }

    function renderOnlineList(users) {
      const list = document.getElementById('onlineList');
      list.innerHTML = users.filter(u => u.userId !== me.id).map(u => `
        <div class="online-item" data-uid="${u.userId}" onclick="selectPrivate('${u.userId}','${u.username}')">
          <span class="online-dot"></span>
          <div class="online-avatar">${u.username.charAt(0).toUpperCase()}</div>
          <div>
            <div class="online-name">${u.username}${u.role==='admin'?' 👑':''}</div>
          </div>
          ${unreadCounts[u.userId] ? `<span class="unread-badge">${unreadCounts[u.userId]}</span>` : ''}
        </div>`).join('');
    }

    function updatePrivateConvEntry(userId, username, lastMsg) {
      const convs = document.getElementById('privateConvs');
      let el = convs.querySelector(`[data-conv="${userId}"]`);
      if (!el) {
        el = document.createElement('div');
        el.className = 'online-item';
        el.dataset.conv = userId;
        el.onclick = () => selectPrivate(userId, username);
        convs.appendChild(el);
      }
      const count = unreadCounts[userId] || 0;
      el.innerHTML = `
        <div class="online-avatar" style="background:var(--accent)">${username.charAt(0).toUpperCase()}</div>
        <div style="flex:1;overflow:hidden">
          <div class="online-name">${username}</div>
          ${lastMsg ? `<div style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lastMsg}</div>` : ''}
        </div>
        ${count > 0 ? `<span class="unread-badge">${count}</span>` : ''}`;
    }

    function clearMessages() {
      messagesArea.innerHTML = '';
      messagesArea.appendChild(scrollBtn);
      emptyChat.style.display = 'none';
    }

    function appendMsg(msg, isPrivate) {
      const isMe = msg.userId === me.id;
      const wrap = document.createElement('div');
      wrap.className = 'msg-bubble ' + (isMe ? 'mine' : 'theirs');

      const time = new Date(msg.time).toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });

      let privateTag = '';
      if (isPrivate) {
        const other = isMe ? msg.toUsername : msg.username;
        privateTag = `<div class="private-label">🔒 خصوصی${isMe ? ' → ' + other : ''}</div>`;
      }

      wrap.innerHTML = `
        ${!isMe ? `<div class="msg-sender">${msg.username}${msg.role==='admin'?' 👑':''}</div>` : ''}
        ${privateTag}
        <div class="msg-body ${isPrivate ? 'private-msg' : ''}">${esc(msg.message)}</div>
        <div class="msg-time">${time}</div>`;

      messagesArea.insertBefore(wrap, scrollBtn);
    }

    function appendSys(text) {
      const div = document.createElement('div');
      div.className = 'msg-sys';
      div.textContent = text;
      messagesArea.insertBefore(div, scrollBtn);
      autoScroll();
    }

    function esc(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function sendMessage() {
      const inp = document.getElementById('msgInput');
      const text = inp.value.trim();
      if (!text || !socket) return;

      if (mode === 'public') {
        socket.emit('chat:sendPublic', { message: text });
      } else if (mode === 'private' && privateTarget) {
        socket.emit('chat:sendPrivate', { toUserId: privateTarget.userId, toUsername: privateTarget.username, message: text });
      }
      inp.value = '';
      inp.style.height = '';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = '';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function cancelReply() {
      document.getElementById('replyPreview').classList.remove('show');
    }

    function scrollBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
      scrollBtn.style.display = 'none';
      scrolledUp = false;
    }
  </script>
</body>
</html>
